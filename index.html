<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>月下夢 — LLM Orchestration · 발표용 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;800&family=Gowun+Batang:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/index.css">
</head>
<body>
<div class="wrap">

  <!-- HERO -->
  <header class="hero">
    <div>
      <h1>月下夢 <span class="accent">LLM Orchestration</span></h1>
    </div>
  </header>


  <section>
    <div class="arch">
      <svg viewBox="0 0 1380 550" xmlns="http://www.w3.org/2000/svg" aria-label="orchestration diagram">
        <defs>
          <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="#6e5a26"/>
          </marker>
          <marker id="arrgold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
            <path d="M0 0 L10 5 L0 10 z" fill="#f4d35e"/>
          </marker>
          <linearGradient id="goldgrad" x1="0" x2="1">
            <stop offset="0" stop-color="#d4af37"/>
            <stop offset="1" stop-color="#f4d35e"/>
          </linearGradient>
        </defs>

        <!-- COLUMN HEADERS -->
        <g font-family="JetBrains Mono,monospace" font-size="11" fill="#6e5a26" letter-spacing="2">
          <text x="80"  y="32">① INPUT</text>
          <text x="340" y="32">② DOMAIN ENGINES (parallel)</text>
          <text x="720" y="32">③ LLM FUSION</text>
          <text x="990" y="32">④ SAFETY &amp; ENRICH</text>
          <text x="1240" y="32">⑤ OUTPUT</text>
        </g>

        <!-- DETERMINISTIC EMPHASIS BANNER -->
        <g>
          <rect x="316" y="42" width="268" height="14" rx="7" fill="#13251a" stroke="#6dc375"/>
          <text x="450" y="53" font-size="9" fill="#6dc375" font-family="JetBrains Mono,monospace" text-anchor="middle" letter-spacing="2">7인 점술가 — DETERMINISTIC + DOMAIN LLM</text>
          <rect x="664" y="42" width="280" height="14" rx="7" fill="#2b2415" stroke="#f4d35e"/>
          <text x="804" y="53" font-size="9" fill="#f4d35e" font-family="JetBrains Mono,monospace" text-anchor="middle" letter-spacing="1">CONTEXT-INJECTED · NOT PRETRAINED</text>
        </g>

        <!-- COLUMN 1 : USER INPUT -->
        <g>
          <!-- 생년월일시·성별 → 만월 아씨 사주 엔진 -->
          <rect x="40" y="55"  width="200" height="60" rx="10" fill="#13251a" stroke="#6dc375"/>
          <text x="60" y="80" font-size="14" fill="#6dc375" font-weight="700">생년월일시 · 성별</text>
          <text x="60" y="100" font-size="11" fill="#9b8c63" font-family="JetBrains Mono,monospace">dt_local · gender · tz</text>

          <!-- MBTI → 만월 아씨 사주 엔진 (engine/saju/explain.py 융합) -->
          <rect x="40" y="135" width="200" height="60" rx="10" fill="#13251a" stroke="#6dc375"/>
          <text x="60" y="160" font-size="14" fill="#6dc375" font-weight="700">MBTI</text>
          <text x="60" y="180" font-size="11" fill="#9b8c63" font-family="JetBrains Mono,monospace">mbti · 십성↔인지기능</text>

          <rect x="40" y="215" width="200" height="60" rx="10" fill="#172147" stroke="#6e5a26"/>
          <text x="60" y="240" font-size="14" fill="#f4d35e" font-weight="700">꿈 텍스트</text>
          <text x="60" y="260" font-size="11" fill="#9b8c63" font-family="JetBrains Mono,monospace">dream_text</text>

          <rect x="40" y="295" width="200" height="75" rx="10" fill="#172147" stroke="#6e5a26"/>
          <text x="60" y="320" font-size="14" fill="#f4d35e" font-weight="700">타로 / 화패 / 주역</text>
          <text x="60" y="340" font-size="11" fill="#9b8c63" font-family="JetBrains Mono,monospace">cards · spread</text>
          <text x="60" y="358" font-size="11" fill="#9b8c63" font-family="JetBrains Mono,monospace">seed · question</text>

          <!-- 얼굴 사진 (관상 → 운학 도사) -->
          <rect x="40" y="375" width="200" height="60" rx="10" fill="#2a1822" stroke="#ff9eb5"/>
          <text x="60" y="400" font-size="14" fill="#ff9eb5" font-weight="700">얼굴 사진</text>
          <text x="60" y="420" font-size="11" fill="#9b8c63" font-family="JetBrains Mono,monospace">face_image · base64</text>

        </g>

        <!-- COLUMN 2 : DOMAIN ENGINES (7인 점술가 + MBTI + 임상, clickable) -->
        <g>
          <!-- 만월 아씨 — 사주 -->
          <g class="pipe-node" data-pipeline="saju" style="cursor:pointer">
            <rect x="320" y="66" width="260" height="56" rx="10" fill="#13251a" stroke="#6dc375"/>
            <text x="340" y="87" font-size="13" fill="#6dc375" font-weight="700">만월 아씨 · 사주 엔진</text>
            <text x="340" y="104" font-size="11" fill="#9b8c63" font-family="JetBrains Mono,monospace">/api/saju · /api/llm/chat</text>
            <text x="340" y="117" font-size="10" fill="#5f5638" font-family="JetBrains Mono,monospace">60갑자 · 십성 · 운성 · 대운</text>
            <text x="565" y="84" font-size="14" fill="#6dc375" text-anchor="end" font-family="JetBrains Mono,monospace">⊕</text>
          </g>

          <!-- 운학 도사 — 관상 (ADR-273~276 최신화) -->
          <g class="pipe-node" data-pipeline="face" style="cursor:pointer">
            <rect x="320" y="136" width="260" height="56" rx="10" fill="#2a1822" stroke="#ff9eb5"/>
            <text x="340" y="157" font-size="13" fill="#ff9eb5" font-weight="700">운학 도사 · 관상</text>
            <text x="340" y="174" font-size="11" fill="#9b8c63" font-family="JetBrains Mono,monospace">/api/face/reading</text>
            <text x="340" y="187" font-size="10" fill="#5f5638" font-family="JetBrains Mono,monospace">AI 2단계(묘사·어조) · 학파 4종</text>
            <text x="565" y="154" font-size="14" fill="#ff9eb5" text-anchor="end" font-family="JetBrains Mono,monospace">⊕</text>
          </g>


          <!-- 묵향 선생 — 이름 -->
          <g class="pipe-node" data-pipeline="name" style="cursor:pointer">
            <rect x="320" y="206" width="260" height="56" rx="10" fill="#1f1a32" stroke="#a78bfa"/>
            <text x="340" y="227" font-size="13" fill="#a78bfa" font-weight="700">묵향 선생 · 이름</text>
            <text x="340" y="244" font-size="11" fill="#9b8c63" font-family="JetBrains Mono,monospace">/api/name/reading</text>
            <text x="340" y="257" font-size="10" fill="#5f5638" font-family="JetBrains Mono,monospace">대법원 9389 한자 + 음운·자원오행</text>
            <text x="565" y="224" font-size="14" fill="#a78bfa" text-anchor="end" font-family="JetBrains Mono,monospace">⊕</text>
          </g>

          <!-- 몽이 도령 — 꿈 -->
          <g class="pipe-node" data-pipeline="dream" style="cursor:pointer">
            <rect x="320" y="276" width="260" height="56" rx="10" fill="#1c2333" stroke="#6fb8ff"/>
            <text x="340" y="297" font-size="13" fill="#6fb8ff" font-weight="700">몽이 도령 · 꿈 해석</text>
            <text x="340" y="314" font-size="11" fill="#9b8c63" font-family="JetBrains Mono,monospace">/api/dream/interpret_v2</text>
            <text x="340" y="327" font-size="10" fill="#5f5638" font-family="JetBrains Mono,monospace">HvDC + Hobson + 14 핵심 + 6 보조</text>
            <text x="565" y="294" font-size="14" fill="#6fb8ff" text-anchor="end" font-family="JetBrains Mono,monospace">⊕</text>
          </g>

          <!-- 화선 낭자 — 화패·타로·주역 -->
          <g class="pipe-node" data-pipeline="divination" style="cursor:pointer">
            <rect x="320" y="346" width="260" height="56" rx="10" fill="#2b2415" stroke="#d4a857"/>
            <text x="340" y="367" font-size="13" fill="#d4a857" font-weight="700">화선 낭자 · 점복</text>
            <text x="340" y="384" font-size="11" fill="#9b8c63" font-family="JetBrains Mono,monospace">/api/hwapae · /tarot · /iching</text>
            <text x="340" y="397" font-size="10" fill="#5f5638" font-family="JetBrains Mono,monospace">화패 48패 + 타로 78 + 주역 64괘</text>
            <text x="565" y="364" font-size="14" fill="#d4a857" text-anchor="end" font-family="JetBrains Mono,monospace">⊕</text>
          </g>

          <!-- MBTI -->
          <g class="pipe-node" data-pipeline="mbti" style="cursor:pointer">
            <rect x="320" y="430" width="260" height="40" rx="10" fill="#241319" stroke="#ff7d6b"/>
            <text x="340" y="448" font-size="12" fill="#ff7d6b" font-weight="700">MBTI 프로필러 (보조)</text>
            <text x="340" y="464" font-size="10" fill="#5f5638" font-family="JetBrains Mono,monospace">/api/profile · Ni/Te/Fi/Se</text>
            <text x="565" y="446" font-size="14" fill="#ff7d6b" text-anchor="end" font-family="JetBrains Mono,monospace">⊕</text>
          </g>

          <!-- 임상 -->
          <g class="pipe-node" data-pipeline="clinical" style="cursor:pointer">
            <rect x="320" y="484" width="260" height="40" rx="10" fill="#1f2731" stroke="#d0d0d0"/>
            <text x="340" y="502" font-size="12" fill="#d0d0d0" font-weight="700">임상 스크리닝 (안전망)</text>
            <text x="340" y="518" font-size="10" fill="#5f5638" font-family="JetBrains Mono,monospace">/api/clinical · PHQ-9·GAD-7·ISI</text>
            <text x="565" y="500" font-size="14" fill="#d0d0d0" text-anchor="end" font-family="JetBrains Mono,monospace">⊕</text>
          </g>
        </g>

        <!-- COLUMN 3 : LLM FUSION -->
        <g>
          <rect x="680" y="230" width="240" height="220" rx="16" fill="url(#goldgrad)" opacity=".1"/>
          <rect x="680" y="230" width="240" height="220" rx="16" fill="none" stroke="#f4d35e" stroke-width="2"/>
          <text x="700" y="258" font-size="14" fill="#f4d35e" font-weight="800" letter-spacing="2">LLM FUSION CORE</text>
          <text x="700" y="280" font-size="11" fill="#d4af37" font-family="JetBrains Mono,monospace">/api/saju/fusion</text>
          <text x="700" y="296" font-size="11" fill="#d4af37" font-family="JetBrains Mono,monospace">/api/saju/ask</text>
          <text x="700" y="312" font-size="11" fill="#d4af37" font-family="JetBrains Mono,monospace">/api/llm/chat</text>

          <line x1="700" y1="328" x2="900" y2="328" stroke="#6e5a26" stroke-dasharray="3 3"/>

          <text x="700" y="350" font-size="12" fill="#f4d35e" font-weight="700">▸ MiniMax (chat)</text>
          <text x="700" y="368" font-size="12" fill="#f4d35e" font-weight="700">▸ BizRouter (fallback)</text>
          <text x="700" y="388" font-size="11" fill="#d4af37" font-family="JetBrains Mono,monospace">prompt + 도메인 컨텍스트 주입</text>
          <text x="700" y="406" font-size="11" fill="#d4af37" font-family="JetBrains Mono,monospace">system + history (≤10)</text>
          <text x="700" y="424" font-size="11" fill="#d4af37" font-family="JetBrains Mono,monospace">temperature · max_tokens</text>
        </g>

        <!-- COLUMN 4 : SAFETY -->
        <g>
          <rect x="960" y="170" width="240" height="56" rx="10" fill="#231319" stroke="#ff7a7a"/>
          <text x="980" y="194" font-size="13" fill="#ff7a7a" font-weight="700">위기 탐지</text>
          <text x="980" y="212" font-size="11" fill="#9b8c63" font-family="JetBrains Mono,monospace">crisis_alert · cathartic</text>

          <rect x="960" y="240" width="240" height="56" rx="10" fill="#1f2731" stroke="#d0d0d0"/>
          <text x="980" y="264" font-size="13" fill="#d0d0d0" font-weight="700">법적 고지 삽입</text>
          <text x="980" y="282" font-size="11" fill="#9b8c63" font-family="JetBrains Mono,monospace">legal_notice (의료/법률/투자)</text>

          <rect x="960" y="310" width="240" height="56" rx="10" fill="#2b2415" stroke="#d4a857"/>
          <text x="980" y="334" font-size="13" fill="#d4a857" font-weight="700">레이트 리밋 · 캐시</text>
          <text x="980" y="352" font-size="11" fill="#9b8c63" font-family="JetBrains Mono,monospace">60 rpm · image/music cache</text>

          <rect x="960" y="380" width="240" height="56" rx="10" fill="#13251a" stroke="#6dc375"/>
          <text x="980" y="404" font-size="13" fill="#6dc375" font-weight="700">메트릭 · LLM 모니터링</text>
          <text x="980" y="422" font-size="11" fill="#9b8c63" font-family="JetBrains Mono,monospace">/metrics · 1% · ADR-036</text>
        </g>

        <!-- COLUMN 5 : OUTPUT -->
        <g>
          <rect x="1220" y="240" width="140" height="180" rx="14" fill="#172147" stroke="#f4d35e" stroke-width="2"/>
          <text x="1240" y="266" font-size="14" fill="#f4d35e" font-weight="800">RESPONSE</text>
          <text x="1240" y="292" font-size="12" fill="#e8d9b0">▸ 본문 텍스트</text>
          <text x="1240" y="310" font-size="12" fill="#e8d9b0">▸ 명식·점괘·관상</text>
          <text x="1240" y="328" font-size="12" fill="#e8d9b0">▸ crisis flag</text>
          <text x="1240" y="346" font-size="12" fill="#e8d9b0">▸ legal_notice</text>
          <text x="1240" y="364" font-size="12" fill="#e8d9b0">▸ 시각화 데이터</text>
          <text x="1240" y="382" font-size="12" fill="#e8d9b0">▸ lang</text>
        </g>

        <!-- EDGES : input -> engines (실 코드 매핑 정합)
             INPUT y 중심: 1=85(생년) · 2=165(MBTI) · 3=245(꿈) · 4=325(점복) · 5=405(얼굴)
             DOMAIN y 중심: 사주=94 · 관상=164 · 이름=234 · 꿈=304 · 점복=374 · MBTI보조=450 · 임상=504
             (palm·star 도메인 제거 — 노드·입력·간선·범례 모두 삭제)
        -->
        <g fill="none" stroke="#6e5a26" stroke-width="1.5" marker-end="url(#arr)">
          <!-- 생년월일시·성별 (y=85) → 사주(83) + 이름(281) -->
          <path class="edge" d="M240 85   C 280 85, 280 94, 320 94"/>
          <path class="edge" d="M240 85   C 280 85, 280 234,320 234"/>
          <!-- MBTI (y=165) → 사주 융합(83) + MBTI 보조(537) -->
          <path class="edge" d="M240 165  C 280 165,280 94, 320 94"/>
          <path class="edge" d="M240 165  C 280 165,280 450,320 450"/>
          <!-- 꿈 텍스트 (y=245) → 몽이 도령 꿈 해석(347) -->
          <path class="edge" d="M240 245  C 280 245,280 304,320 304"/>
          <!-- 타로/화패/주역 + question (y=325) → 화선 점복(413) -->
          <path class="edge" d="M240 325  C 280 325,280 374,320 374"/>
          <!-- 얼굴 사진 (y=405) → 운학 도사 관상(149) -->
          <path stroke="#ff9eb5" class="edge" d="M240 405  C 280 405,280 164,320 164"/>
          <!-- 임상은 사용자 별도 자가검사 선택 (INPUT 직결 X — 별도 선택 단계) -->
        </g>

        <!-- EDGES : engines -> fusion (9개 → fusion box 230~450) -->
        <g fill="none" stroke="#f4d35e" stroke-width="1.7" marker-end="url(#arrgold)" opacity=".85">
          <path class="edge" id="e-saju"     d="M580 94  C 630 94, 630 250, 680 250"/>
          <path class="edge" id="e-face"     d="M580 164 C 630 164, 630 275, 680 275"/>
          <path class="edge" id="e-name"     d="M580 234 C 630 234, 630 325, 680 325"/>
          <path class="edge" id="e-dream"    d="M580 304 C 630 304, 630 350, 680 350"/>
          <path class="edge" id="e-div"      d="M580 374 C 630 374, 630 375, 680 375"/>
          <path class="edge" id="e-mbti"     d="M580 450 C 630 450, 630 425, 680 425"/>
          <path class="edge" id="e-clinical" d="M580 504 C 630 504, 630 445, 680 445"/>
        </g>

        <!-- EDGES : fusion -> safety (4개 → safety box 170~436) -->
        <g fill="none" stroke="#f4d35e" stroke-width="1.7" marker-end="url(#arrgold)" opacity=".85">
          <path class="edge" d="M920 280 C 940 280,940 198,960 198"/>
          <path class="edge" d="M920 320 C 940 320,940 268,960 268"/>
          <path class="edge" d="M920 360 C 940 360,940 338,960 338"/>
          <path class="edge" d="M920 400 C 940 400,940 408,960 408"/>
        </g>

        <!-- EDGES : safety -> output (4개) -->
        <g fill="none" stroke="#6e5a26" stroke-width="1.5" marker-end="url(#arr)">
          <path class="edge" d="M1200 198 C 1210 198,1210 290,1220 290"/>
          <path class="edge" d="M1200 268 C 1210 268,1210 310,1220 310"/>
          <path class="edge" d="M1200 338 C 1210 338,1210 330,1220 330"/>
          <path class="edge" d="M1200 408 C 1210 408,1210 350,1220 350"/>
        </g>

      </svg>

      <div class="legend">
        <span><i style="background:#6dc375"></i>만월 아씨 · 사주</span>
        <span><i style="background:#ff9eb5"></i>운학 도사 · 관상</span>
        <span><i style="background:#a78bfa"></i>묵향 선생 · 이름</span>
        <span><i style="background:#6fb8ff"></i>몽이 도령 · 꿈</span>
        <span><i style="background:#d4a857"></i>화선 낭자 · 점복</span>
        <span><i style="background:#ff7d6b"></i>MBTI 보조</span>
        <span><i style="background:#d0d0d0"></i>임상 안전망</span>
        <span><i style="background:#f4d35e"></i>LLM Fusion Path</span>
      </div>
    </div>
  </section>


</div>

<script type="module" src="assets/js/main.js"></script>

<!-- 파이프라인 세부 모달 -->
<div class="pipe-modal-bg" id="pipe-modal-bg" role="dialog" aria-modal="true">
  <div class="pipe-modal" style="position:relative">
    <div id="pipe-modal-body"></div>
  </div>
</div>
</body>
